version: "3.9"

services:
  chroma:
    image: chromadb/chroma:0.5.5
    container_name: ticket-resolve-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      ALLOW_RESET: "true"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticket-resolve-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    volumes:
      - ./data:/app/data
    depends_on:
      chroma:
        condition: service_healthy
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --loop uvloop

volumes:
  chroma_data:
